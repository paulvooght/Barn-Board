<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Barn Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Kodchasan:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // One-time cache bust: unregister old SWs and clear caches (bump version to re-trigger)
      (function() {
        var CACHE_BUST_VERSION = 1;
        var key = 'cache_bust_v';
        if (localStorage.getItem(key) !== String(CACHE_BUST_VERSION)) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(n) { caches.delete(n); });
            });
          }
          localStorage.setItem(key, String(CACHE_BUST_VERSION));
          // Reload after clearing so the fresh version loads without SW
          setTimeout(function() { location.reload(); }, 500);
        }
      })();

      // iOS PWA standalone: native focus handler bypasses React synthetic events
      document.addEventListener('touchend', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
          setTimeout(function() { e.target.focus(); }, 0);
        }
      }, { passive: true });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
